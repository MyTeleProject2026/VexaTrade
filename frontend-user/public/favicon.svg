<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="cyanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="#0a0e1a" stroke="url(#cyanGradient)" stroke-width="2"/>
  
  <!-- Candlesticks -->
  <rect x="30" y="45" width="10" height="35" rx="2" fill="url(#cyanGradient)"/>
  <line x1="35" y1="38" x2="35" y2="45" stroke="#06b6d4" stroke-width="2"/>
  <line x1="35" y1="80" x2="35" y2="85" stroke="#06b6d4" stroke-width="2"/>
  
  <rect x="45" y="30" width="10" height="50" rx="2" fill="#ef4444"/>
  <line x1="50" y1="24" x2="50" y2="30" stroke="#ef4444" stroke-width="2"/>
  <line x1="50" y1="80" x2="50" y2="85" stroke="#ef4444" stroke-width="2"/>
  
  <rect x="60" y="55" width="10" height="25" rx="2" fill="url(#cyanGradient)"/>
  <line x1="65" y1="48" x2="65" y2="55" stroke="#06b6d4" stroke-width="2"/>
  <line x1="65" y1="80" x2="65" y2="83" stroke="#06b6d4" stroke-width="2"/>
  
  <!-- V Letter -->
  <polygon points="35,88 50,60 65,88" fill="none" stroke="url(#cyanGradient)" stroke-width="3" stroke-linejoin="round"/>
</svg>