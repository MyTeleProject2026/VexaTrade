<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <defs>
    <!-- Gradients -->
    <linearGradient id="cyanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0" />
    </linearGradient>
    
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cbd5e1;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1422;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Icon Background - Hexagon shape (like Binance) -->
  <polygon points="70,25 120,50 120,110 70,135 20,110 20,50" fill="url(#bgGradient)" stroke="url(#cyanGradient)" stroke-width="3" filter="url(#glowFilter)"/>
  
  <!-- Inner glow -->
  <polygon points="70,35 110,55 110,105 70,125 30,105 30,55" fill="url(#cyanGlow)"/>
  
  <!-- Trading Chart Pattern (Wave/Arrow) -->
  <polyline points="35,100 50,85 65,90 80,70 95,80 110,55" 
    fill="none" stroke="url(#cyanGradient)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Arrow head -->
  <polygon points="110,55 105,65 115,58" fill="url(#cyanGradient)"/>
  
  <!-- Candlestick pattern in background -->
  <rect x="42" y="75" width="6" height="25" rx="2" fill="#06b6d4" opacity="0.5"/>
  <line x1="45" y1="70" x2="45" y2="75" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  
  <rect x="55" y="65" width="6" height="35" rx="2" fill="#ef4444" opacity="0.5"/>
  <line x1="58" y1="58" x2="58" y2="65" stroke="#ef4444" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  
  <rect x="85" y="80" width="6" height="20" rx="2" fill="#06b6d4" opacity="0.5"/>
  <line x1="88" y1="75" x2="88" y2="80" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Text Section -->
  <text x="145" y="65" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="800" letter-spacing="4" fill="url(#textGradient)">
    VEXA
  </text>
  
  <text x="145" y="105" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="700" letter-spacing="6" fill="url(#cyanGradient)" filter="url(#glowFilter)">
    TRADE
  </text>
  
  <!-- Decorative line under text -->
  <line x1="145" y1="115" x2="480" y2="115" stroke="url(#cyanGradient)" stroke-width="2" stroke-opacity="0.5"/>
  
  <!-- Tagline -->
  <text x="145" y="135" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="500" letter-spacing="5" fill="#64748b">
    CRYPTO TRADING PLATFORM
  </text>
  
  <!-- Small decorative elements -->
  <circle cx="145" cy="143" r="2" fill="#06b6d4" opacity="0.6"/>
  <circle cx="155" cy="143" r="2" fill="#06b6d4" opacity="0.4"/>
  <circle cx="165" cy="143" r="2" fill="#06b6d4" opacity="0.2"/>
</svg>