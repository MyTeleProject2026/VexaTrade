<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vexatrade-icon.svg" />
    
    <!-- Viewport Settings for Mobile PWA -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    
    <!-- PWA / Home Screen Settings -->
    <meta name="theme-color" content="#0a0e1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VexaTrade" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Primary Meta Tags -->
    <title>VexaTrade | Crypto Trading Platform</title>
    <meta name="title" content="VexaTrade - Modern Crypto Trading Platform" />
    <meta name="description" content="Trade cryptocurrencies with confidence. Advanced trading tools, joint accounts, QR transfers, and professional dashboard." />
    <meta name="keywords" content="crypto, trading, bitcoin, ethereum, cryptocurrency exchange, VexaTrade" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vexatrade.onrender.com/" />
    <meta property="og:title" content="VexaTrade - Crypto Trading Platform" />
    <meta property="og:description" content="Trade cryptocurrencies with confidence. Advanced trading tools, joint accounts, QR transfers, and professional dashboard." />
    <meta property="og:site_name" content="VexaTrade" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registered:', reg))
            .catch(err => console.log('Service Worker failed:', err));
        });
      }
    </script>
  </body>
</html>
